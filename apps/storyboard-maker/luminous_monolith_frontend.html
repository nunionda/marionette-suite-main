<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUX KINETICA — Luminous Monolith</title>
    <!-- Whisper-thin refined typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cutive+Mono&family=Jost:wght@100;200;300&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #030303;
            --silver: #eaeaea;
            --mid-gray: #555555;
            --dark-gray: #1a1a1a;
            --light-slice: rgba(255, 255, 255, 0.85);
            --void: rgba(0, 0, 0, 0.95);
        }

        * {
            box-sizing: border-box;
            cursor: none; /* Custom cursor used */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--obsidian);
            color: var(--silver);
            font-family: 'Jost', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }

        /* Ambient Film Grain */
        .film-grain {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 9000;
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Core Structure Grid */
        .monolith-wrapper {
            position: relative;
            width: 85vw;
            height: 85vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .monolith-wrapper::before, .monolith-wrapper::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.02);
            z-index: 1;
        }

        .monolith-wrapper::before {
            width: 1px;
            height: 100vh;
            left: 20%;
            top: -20vh;
        }

        .monolith-wrapper::after {
            height: 1px;
            width: 100vw;
            bottom: 25%;
            left: -20vw;
        }

        /* Anamorphic Central Frame */
        .anamorphic-frame {
            width: 65vw;
            aspect-ratio: 2.35 / 1;
            position: relative;
            overflow: hidden;
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            background: var(--void);
            z-index: 10;
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.8) inset, 
                        0 20px 60px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: scale(0.98);
            animation: emerge 3s cubic-bezier(0.1, 0.8, 0.2, 1) 0.5s forwards;
            transition: filter 0.8s ease;
        }

        @keyframes emerge {
            to { opacity: 1; transform: scale(1); }
        }

        .anamorphic-frame:hover {
            filter: brightness(1.1);
        }

        .hero-image {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* Cinema-grade unspalsh placeholder */
            background-image: url('https://images.unsplash.com/photo-1478760329108-5c3ed9d495a0?q=80&w=2574&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            filter: grayscale(100%) contrast(1.1) brightness(0.7);
            transform: scale(1.05);
            transition: transform 12s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .anamorphic-frame:hover .hero-image {
            transform: scale(1.0);
        }

        /* Stark Light Slices */
        .light-slice {
            position: absolute;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--light-slice), transparent);
            opacity: 0.6;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            z-index: 20;
        }

        .light-slice.top { top: 0; }
        .light-slice.bottom { bottom: 0; }
        
        .shutter-line {
            position: absolute;
            height: 100%;
            width: 1px;
            background: rgba(255, 255, 255, 0.15);
            top: 0; left: 50%;
            transform: translateX(-50%);
            mix-blend-mode: screen;
            z-index: 15;
            opacity: 0;
            animation: blink 8s infinite 3s;
        }

        @keyframes blink {
            0%, 96% { opacity: 0; }
            97% { opacity: 0.8; box-shadow: 0 0 10px white; }
            98% { opacity: 0; }
            99% { opacity: 0.4; }
            100% { opacity: 0; }
        }

        /* Spatial Coordinates & Austere Typography */
        .coordinate {
            position: absolute;
            font-family: 'Cutive Mono', monospace;
            font-size: 0.55rem;
            letter-spacing: 0.25rem;
            color: var(--mid-gray);
            text-transform: uppercase;
            z-index: 5;
            opacity: 0;
            animation: slowFade 2s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
        }

        .top-left { top: 0; left: 0; animation-delay: 1.2s; }
        .top-right { top: 0; right: 0; animation-delay: 1.4s; }
        .bottom-left { bottom: 0; left: 0; animation-delay: 1.6s; }
        .bottom-right { bottom: 0; right: 0; animation-delay: 1.8s; }

        .coordinate-accent {
            color: var(--silver);
        }

        /* Navigation: Whispered along the perimeter */
        .vertical-nav {
            position: absolute;
            right: -2rem;
            top: 50%;
            transform: translateY(-50%);
            z-index: 50;
        }

        .vertical-nav ul {
            list-style: none;
            padding: 0; margin: 0;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        .vertical-nav a {
            text-decoration: none;
            color: var(--mid-gray);
            font-weight: 100;
            font-size: 0.75rem;
            letter-spacing: 0.45rem;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            transition: color 0.4s ease, letter-spacing 0.4s ease, text-shadow 0.4s ease;
            opacity: 0;
            animation: slideIn 1s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
        }

        .vertical-nav li:nth-child(1) a { animation-delay: 2.0s; }
        .vertical-nav li:nth-child(2) a { animation-delay: 2.1s; }
        .vertical-nav li:nth-child(3) a { animation-delay: 2.2s; }
        .vertical-nav li:nth-child(4) a { animation-delay: 2.3s; }
        .vertical-nav li:nth-child(5) a { animation-delay: 2.4s; }

        .vertical-nav a:hover, .vertical-nav a.active {
            color: var(--silver);
            letter-spacing: 0.55rem;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        /* Title / Brand Mark */
        .brand-mark {
            position: absolute;
            left: -3rem;
            top: 50%;
            font-weight: 100;
            font-size: 2.5rem;
            letter-spacing: 1.2rem;
            color: var(--silver);
            writing-mode: vertical-rl;
            transform: rotate(180deg) translateY(-50%);
            opacity: 0;
            z-index: 50;
            animation: slowFade 3s cubic-bezier(0.1, 0.8, 0.2, 1) 1.5s forwards;
            white-space: nowrap;
        }

        .brand-mark span {
            font-weight: 300;
        }

        /* Auxiliary Information */
        .sub-timeline {
            position: absolute;
            bottom: -3rem;
            width: 65vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 1.5rem;
            opacity: 0;
            animation: slowFade 2s cubic-bezier(0.1, 0.8, 0.2, 1) 2.5s forwards;
        }

        .timeline-item {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            opacity: 0.3;
            transition: opacity 0.5s ease;
        }

        .timeline-item:hover {
            opacity: 1;
        }

        .timeline-thumb {
            width: 120px;
            height: 40px;
            background-color: var(--dark-gray);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .timeline-thumb::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .timeline-item:hover .timeline-thumb::after {
            transform: translateX(100%);
        }

        .timeline-label {
            font-weight: 200;
            font-size: 0.6rem;
            letter-spacing: 0.3rem;
            text-transform: uppercase;
        }

        .play-indicator {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-weight: 200;
            font-size: 0.75rem;
            letter-spacing: 0.5rem;
            color: var(--silver);
            opacity: 0;
            transition: opacity 0.5s ease, letter-spacing 0.5s ease;
            z-index: 30;
            mix-blend-mode: difference;
        }

        .anamorphic-frame:hover .play-indicator {
            opacity: 1;
            letter-spacing: 0.8rem;
        }

        /* Generic Animations */
        @keyframes slowFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: rotate(180deg) translateX(-20px); }
            to { opacity: 1; transform: rotate(180deg) translateX(0); }
        }

        /* Custom Crosshair Cursor */
        .custom-cursor {
            position: fixed;
            top: 0; left: 0;
            width: 2px; height: 2px;
            background: var(--silver);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, background 0.2s;
            mix-blend-mode: difference;
        }

        .custom-cursor.active {
            width: 40px; height: 40px;
            background: transparent;
            border: 1px solid var(--silver);
        }

        .cursor-follower {
            position: fixed;
            top: 0; left: 0;
            width: 30px; height: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            transition: top 0.15s ease-out, left 0.15s ease-out, opacity 0.3s;
            opacity: 1;
            mix-blend-mode: difference;
        }

        .cursor-follower.active {
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="film-grain"></div>

    <div class="custom-cursor" id="cursor"></div>
    <div class="cursor-follower" id="cursorFollower"></div>

    <div class="monolith-wrapper">
        <div class="coordinate top-left">SEQ_001.0 // <span class="coordinate-accent">EXT. VOID</span></div>
        <div class="coordinate top-right">LAT 34.01°N | LONG 118.49°W</div>
        <div class="coordinate bottom-left">STATUS: <span class="coordinate-accent">PRODUCTION</span></div>
        <div class="coordinate bottom-right">[ PROJECT: OBSIDIAN ]</div>

        <div class="brand-mark">LUX <span>KINETICA</span></div>

        <div class="anamorphic-frame">
            <div class="hero-image"></div>
            <div class="light-slice top"></div>
            <div class="light-slice bottom"></div>
            <div class="shutter-line"></div>
            <div class="play-indicator">INITIALIZE</div>
        </div>

        <nav class="vertical-nav">
            <ul>
                <li><a href="#" class="nav-link">ABOUT</a></li>
                <li><a href="#" class="nav-link active">WORKS</a></li>
                <li><a href="#" class="nav-link">PROCESS</a></li>
                <li><a href="#" class="nav-link">TEAM</a></li>
                <li><a href="#" class="nav-link">CONTACT</a></li>
            </ul>
        </nav>

        <div class="sub-timeline">
            <div class="timeline-item">
                <div class="timeline-thumb" style="background-image: url('https://images.unsplash.com/photo-1542051812871-7575de2dbf57?q=80&w=600&auto=format&fit=crop'); background-size: cover; filter: grayscale(1);"></div>
                <div class="timeline-label">FEATURE FILMS</div>
            </div>
            <div class="timeline-item">
                <div class="timeline-thumb" style="background-image: url('https://images.unsplash.com/photo-1505322022379-7c3353ee6291?q=80&w=600&auto=format&fit=crop'); background-size: cover; filter: grayscale(1) brightness(0.6);"></div>
                <div class="timeline-label">DOCUMENTARIES</div>
            </div>
            <div class="timeline-item">
                <div class="timeline-thumb" style="background-image: url('https://images.unsplash.com/photo-1517511620718-47120c153db1?q=80&w=600&auto=format&fit=crop'); background-size: cover; filter: grayscale(1) contrast(1.5);"></div>
                <div class="timeline-label">COMMERCIALS</div>
            </div>
        </div>
    </div>

    <script>
        // Custom Cursor Logic
        const cursor = document.getElementById('cursor');
        const follower = document.getElementById('cursorFollower');
        const links = document.querySelectorAll('a, .anamorphic-frame, .timeline-item');

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            
            follower.style.left = e.clientX + 'px';
            follower.style.top = e.clientY + 'px';
        });

        links.forEach(link => {
            link.addEventListener('mouseenter', () => {
                cursor.classList.add('active');
                follower.classList.add('active');
            });
            link.addEventListener('mouseleave', () => {
                cursor.classList.remove('active');
                follower.classList.remove('active');
            });
        });

        // Dynamic Parallax on the frame based on mouse movement
        const frame = document.querySelector('.anamorphic-frame');
        const heroImg = document.querySelector('.hero-image');

        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
            
            frame.style.transform = `perspective(1000px) rotateY(${xAxis}deg) rotateX(${yAxis}deg) scale(1)`;
            heroImg.style.transform = `scale(1.05) translate(${xAxis * 1.5}px, ${yAxis * 1.5}px)`;
        });
    </script>

<div id="hub-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:#111;border:1px solid #333;border-radius:12px;padding:2rem;min-width:340px;color:#eee;font-family:monospace;">
    <h2 style="margin:0 0 1rem;font-size:1.1rem;letter-spacing:.1em;">STORYBOARD MAKER</h2>
    <div id="hub-project-id" style="font-size:.8rem;color:#888;margin-bottom:1.5rem;"></div>
    <div id="hub-steps" style="display:flex;gap:.75rem;margin-bottom:1.5rem;">
      <span id="step-imagePrompt" style="padding:.3rem .7rem;border-radius:4px;font-size:.75rem;background:#222;color:#666;">imagePrompt ⏳</span>
      <span id="step-videoPrompt" style="padding:.3rem .7rem;border-radius:4px;font-size:.75rem;background:#222;color:#666;">videoPrompt ⏳</span>
    </div>
    <form id="hub-form">
      <input id="hub-scene" name="scene" placeholder="Scene description (optional)" style="width:100%;box-sizing:border-box;background:#1a1a1a;border:1px solid #444;color:#eee;padding:.5rem;border-radius:4px;margin-bottom:.75rem;font-family:monospace;font-size:.85rem;">
      <button type="submit" style="width:100%;padding:.6rem;background:#e50914;border:none;color:#fff;border-radius:4px;cursor:pointer;font-size:.9rem;letter-spacing:.05em;">GENERATE</button>
    </form>
    <div id="hub-msg" style="margin-top:.75rem;font-size:.8rem;color:#aaa;"></div>
  </div>
</div>

<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const pid = params.get('paperclipId');
  if (!pid) return;

  const overlay = document.getElementById('hub-overlay');
  overlay.style.display = 'flex';
  document.getElementById('hub-project-id').textContent = 'Project: ' + pid;

  function updateBadge(id, done) {
    const el = document.getElementById('step-' + id);
    if (!el) return;
    el.style.background = done ? '#1a472a' : '#222';
    el.style.color = done ? '#4ade80' : '#666';
    el.textContent = id + (done ? ' ✅' : ' ⏳');
  }

  function poll() {
    fetch('/api/progress?paperclipId=' + encodeURIComponent(pid))
      .then(r => r.json())
      .then(data => {
        const steps = data.steps || {};
        updateBadge('imagePrompt', steps.imagePrompt);
        updateBadge('videoPrompt', steps.videoPrompt);
      })
      .catch(() => {});
  }

  poll();
  setInterval(poll, 5000);

  document.getElementById('hub-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const scene = document.getElementById('hub-scene').value.trim();
    const body = { paperclipId: pid };
    if (scene) body.scene = scene;
    fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    }).then(r => r.json()).then(data => {
      document.getElementById('hub-msg').textContent = data.status === 'started'
        ? 'Generation started! Polling for progress…'
        : JSON.stringify(data);
    }).catch(err => {
      document.getElementById('hub-msg').textContent = 'Error: ' + err.message;
    });
  });
})();
</script>
</body>
</html>
